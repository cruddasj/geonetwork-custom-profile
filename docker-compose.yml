services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  geonetwork:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    image: geonetwork-gemini23:4.2
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ES_HOST: elasticsearch
      ES_PORT: 9200
      ES_PROTOCOL: http
      ES_URL: http://elasticsearch:9200
      JAVA_OPTS: -Xms512m -Xmx1024m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/geonetwork/srv/api/site || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 30

volumes:
  esdata:
